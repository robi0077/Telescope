
version: '3.8'

services:
  # 1. Redis (The Central Nervous System)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 2. API Server (The "Receptionist")
  api:
    build: .
    command: uvicorn telescope.server:app --host 0.0.0.0 --port 8000
    volumes:
      - ./temp_uploads:/app/temp_uploads
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/temp_uploads
      - API_KEY=telescope-secret-key-change-me
    depends_on:
      - redis

  # 3. Worker (The "Heavy Lifter")
  worker:
    build: .
    command: celery -A telescope.worker.celery_app worker --loglevel=info
    volumes:
      - ./temp_uploads:/app/temp_uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/temp_uploads
    depends_on:
      - redis
      - api
